[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  GITHUB_OWNER = "ZeroDegreeStation"
  GITHUB_REPO = "Calendar"
  SITE_NAME = "SnowStation"

# Form redirects
[[redirects]]
  from = "/booking-success"
  to = "/index.html#booking-success"
  status = 200

# Cache headers for performance
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"